name: Deploy to Firebase Hosting on PR
'on': pull_request
# The Nx Cloud org is disabled (free-plan quota); with an access token
# present, nx hard-fails CI at authorization before running any task.
env:
  NX_NO_CLOUD: 'true'
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AGLYN_APP }}'
          projectId: aglyn-app
