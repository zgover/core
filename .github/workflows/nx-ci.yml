name: NX CI

on:
  push:
    branches:
      - main
  pull_request:

# The Nx Cloud org is disabled (free-plan quota); with an access token
# present, nx hard-fails CI at authorization before running any task.
env:
  NX_NO_CLOUD: 'true'

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - uses: nrwl/nx-set-shas@v4

      - run: npx nx affected -t lint test build --parallel=3
